[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "dataprep"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = ["pandas>=2"]

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["dataprep*"]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "connectors"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = ["pydantic>=2", "pandas>=2", "sqlalchemy>=2"]

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["connectors*"]

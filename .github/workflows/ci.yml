name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install -e packages/connectors -e packages/semantic -e packages/analytics

      - name: Run backend test matrix
        shell: pwsh
        env:
          PYTHON_EXE: python
        run: ./infrastructure/scripts/backend-tests.ps1

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm --workspace apps/web exec tsc --noEmit

      - name: Build frontend
        run: npm --workspace apps/web run build

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: [frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npm --workspace apps/web exec playwright install --with-deps chromium

      - name: Run Playwright smoke flows
        run: npm --workspace apps/web run test:e2e

  docker-smoke:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build, frontend-e2e]
    steps:
      - uses: actions/checkout@v4

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for API health
        run: |
          for i in {1..40}; do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "API is healthy"
              exit 0
            fi
            sleep 3
          done
          echo "API failed health check"
          docker compose ps
          exit 1

      - name: Teardown
        if: always()
        run: docker compose down -v

name: ops-verify

on:
  workflow_dispatch:
    inputs:
      api_base:
        description: "Target API base URL"
        required: true
        default: "https://staging.example.com"
      web_base:
        description: "Target web base URL"
        required: true
        default: "https://staging.example.com"
      include_billing:
        description: "Run billing smoke checks"
        required: true
        default: true
        type: boolean
      include_connectors:
        description: "Run live connector validation"
        required: true
        default: false
        type: boolean
      include_load:
        description: "Run authenticated load test"
        required: true
        default: true
        type: boolean
      validate_env:
        description: "Validate deployment secrets on the runner"
        required: true
        default: true
        type: boolean
      require_stripe:
        description: "Require Stripe env vars during validation"
        required: true
        default: false
        type: boolean
      load_users:
        description: "Concurrent users for load test"
        required: true
        default: "25"
      load_spawn_rate:
        description: "User spawn rate"
        required: true
        default: "5"
      load_duration:
        description: "Load duration"
        required: true
        default: "2m"

jobs:
  verify:
    runs-on: windows-latest
    environment: staging
    permissions:
      contents: read
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      BILLING_PROVIDER: ${{ secrets.BILLING_PROVIDER }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_PRICE_STARTER: ${{ secrets.STRIPE_PRICE_STARTER }}
      STRIPE_PRICE_GROWTH: ${{ secrets.STRIPE_PRICE_GROWTH }}
      STRIPE_PRICE_ENTERPRISE: ${{ secrets.STRIPE_PRICE_ENTERPRISE }}
      LIVE_POSTGRES_URI: ${{ secrets.LIVE_POSTGRES_URI }}
      LIVE_MYSQL_URI: ${{ secrets.LIVE_MYSQL_URI }}
      LIVE_GOOGLE_SHEETS_CSV_URL: ${{ secrets.LIVE_GOOGLE_SHEETS_CSV_URL }}
      LIVE_SALESFORCE_USERNAME: ${{ secrets.LIVE_SALESFORCE_USERNAME }}
      LIVE_SALESFORCE_PASSWORD: ${{ secrets.LIVE_SALESFORCE_PASSWORD }}
      LIVE_SALESFORCE_SECURITY_TOKEN: ${{ secrets.LIVE_SALESFORCE_SECURITY_TOKEN }}
      STAGING_EMAIL: ${{ secrets.STAGING_EMAIL }}
      STAGING_PASSWORD: ${{ secrets.STAGING_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install load-test dependencies
        run: python -m pip install --upgrade pip && pip install -r infrastructure/perf/requirements.txt

      - name: Install connector validation dependencies
        if: ${{ github.event.inputs.include_connectors == 'true' }}
        run: |
          pip install -r apps/api/requirements.txt
          pip install -e packages/connectors -e packages/semantic -e packages/analytics

      - name: Run operational verification
        shell: pwsh
        run: |
          $args = @(
            '-ExecutionPolicy', 'Bypass',
            '-File', 'infrastructure/scripts/ops-verify.ps1',
            '-ApiBase', '${{ github.event.inputs.api_base }}',
            '-WebBase', '${{ github.event.inputs.web_base }}',
            '-ReportPath', 'infrastructure/tmp/ops-verify/workflow-summary.json',
            '-LoadUsers', '${{ github.event.inputs.load_users }}',
            '-LoadSpawnRate', '${{ github.event.inputs.load_spawn_rate }}',
            '-LoadDuration', '${{ github.event.inputs.load_duration }}'
          )

          if ($env:STAGING_EMAIL -and $env:STAGING_PASSWORD) {
            $args += @('-Email', $env:STAGING_EMAIL, '-Password', $env:STAGING_PASSWORD)
          }
          if ('${{ github.event.inputs.validate_env }}' -eq 'true') {
            $args += '-ValidateEnv'
          }
          if ('${{ github.event.inputs.require_stripe }}' -eq 'true') {
            $args += '-RequireStripe'
          }
          if ('${{ github.event.inputs.include_billing }}' -eq 'true') {
            $args += '-IncludeBilling'
          }
          if ('${{ github.event.inputs.include_connectors }}' -eq 'true') {
            $args += '-IncludeConnectors'
          }
          if ('${{ github.event.inputs.include_load }}' -eq 'true') {
            $args += '-IncludeLoad'
          }

          powershell.exe @args

      - name: Upload verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ops-verify-artifacts
          path: infrastructure/tmp/ops-verify

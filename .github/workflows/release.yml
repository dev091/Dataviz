name: release

on:
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: "Optional git SHA to rollback to if deploy fails"
        required: false
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and deploy stack
        run: docker compose up -d --build

      - name: Verify API health
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Deployment healthy"
              exit 0
            fi
            sleep 3
          done
          echo "Deployment health check failed"
          docker compose ps
          exit 1

      - name: Teardown
        if: always()
        run: docker compose down -v

  rollback:
    if: failure() && github.event.inputs.rollback_sha != ''
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.rollback_sha }}

      - name: Rollback deploy
        run: docker compose up -d --build

      - name: Verify rollback health
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Rollback healthy"
              exit 0
            fi
            sleep 3
          done
          echo "Rollback health check failed"
          docker compose ps
          exit 1

      - name: Teardown
        if: always()
        run: docker compose down -v
